<p>alumnos works!</p>

<div class="container">
    <div style="margin-top: 10px">

        <!-- Dar formato de ancho a mat-toolbar -->
        <mat-toolbar>
            <span>Alumnos</span>
            <div class="example-spacer"></div>
            <button mat-raised-button color="warn" (click)="openDialog()">Agregar</button>
        </mat-toolbar>

        <mat-form-field appearance="standard">
            <mat-label>Filter</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
        </mat-form-field>


        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="dataSource" matSort>
                
                <!-- nombre -->
                <ng-container matColumnDef="nombre">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
                    <td mat-cell *matCellDef="let row"> {{row.nombre}} </td>
                </ng-container>
                
                <!-- apellidoPaterno -->
                <ng-container matColumnDef="apellidoPaterno">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Apellido paterno </th>
                    <td mat-cell *matCellDef="let row"> {{row.apellidoPaterno}} </td>
                </ng-container>
                
                <!-- apellidoMaterno -->
                <ng-container matColumnDef="apellidoMaterno">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Apellido materno </th>
                    <td mat-cell *matCellDef="let row"> {{row.apellidoMaterno}} </td>
                </ng-container>
                
                <!-- fechaNacimiento -->
                <ng-container matColumnDef="fechaNacimiento">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Fecha de nacimiento </th>
                    <td mat-cell *matCellDef="let row"> {{row.fechaNacimiento | date}} </td>
                </ng-container>
                
                <!-- Género -->
                <ng-container matColumnDef="genero">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Género </th>
                    <td mat-cell *matCellDef="let row"> {{row.genero}} </td>
                </ng-container>

                <!-- Número de contacto -->
                <ng-container matColumnDef="noContacto">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Número de contacto </th>
                    <td mat-cell *matCellDef="let row"> {{row.noContacto}} </td>
                </ng-container>
                
                <!-- action Column -->
                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> action </th>
                    <td mat-cell *matCellDef="let row">
                        <button mat-icon-button (click)="editAlumno(row)" color="primary">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button (click)="deleteAlumno(row.id)" color="warn">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>
                
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                
                <!-- Row shown when there is no matching data. -->
                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
                </tr>
            </table>
            
            <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
        </div>
    
    </div>
</div>
